---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: inputs.sequencer.fn.crossplane.io
spec:
  group: sequencer.fn.crossplane.io
  names:
    categories:
    - crossplane
    kind: Input
    listKind: InputList
    plural: inputs
    singular: input
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: Input can be used to provide input to this Function.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          cacheTTL:
            default: 1m
            description: |-
              CacheTTL sets the time-to-live for the Function response.
              Function response caching is an alpha feature in Crossplane and can
              change in future releases.
            type: string
          enableDeletionSequencing:
            description: |-
              EnableDeletionSequencing controls the automatic creation of Usage/ClusterUsage resources from the dependency tree
              defined by the rule sequences.
            type: boolean
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          replayDeletion:
            description: ReplayDeletion sets the Usage/ClusterUsage replayDeletion
              attribute.
            type: boolean
          resetCompositeReadiness:
            description: ResetCompositeReadiness sets the composite ready state to
              false if desired resources are removed from the request.
            type: boolean
          rules:
            description: Rules is a list of rules that describe sequences of resources.
            items:
              description: SequencingRule is a rule that describes a sequence of resources.
              properties:
                condition:
                  description: |-
                    Condition is a CEL expression evaluated against the function request state.
                    When set and evaluates to false, the entire sequence is skipped for creation
                    sequencing. Available variables: observed, desired, context (matching
                    function-cel-filter conventions).
                    Example: observed.composite.resource.spec.enableFeatureX == true
                  type: string
                deleteOnly:
                  description: |-
                    DeleteOnly skips creation sequencing for this rule.
                    Resources are not blocked from creation; only deletion ordering
                    (via Usage/ClusterUsage) is enforced when enableDeletionSequencing is true.
                  type: boolean
                sequence:
                  description: Sequence is a list of composition resource names.
                  items:
                    description: |-
                      A Name uniquely identifies a composed resource within a Composition Function
                      pipeline. It's not the resource's metadata.name.
                    type: string
                  type: array
              type: object
            type: array
          usageVersion:
            description: UsageVersion specifies the version of Usage/ClusterUsage
              resource to be created.
            type: string
        required:
        - rules
        type: object
    served: true
    storage: true
